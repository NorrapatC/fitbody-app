<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FitBody — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<style>
:root {
  --bg: #080b10;
  --surface: #0f1318;
  --surface2: #161b24;
  --border: rgba(255,255,255,0.08);
  --accent: #f5c842;
  --accent2: #ff6b35;
  --accent3: #4ade80;
  --accent4: #60a5fa;
  --text: #eef2f7;
  --muted: #5a6478;
  --font-d: 'Bebas Neue', sans-serif;
  --font-b: 'Noto Sans Thai', sans-serif;
  --font-m: 'DM Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font-b);background:var(--bg);color:var(--text)}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;overflow-x:hidden}

/* noise */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

/* glow */
.glow{position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(245,200,66,0.12) 0%,transparent 70%);pointer-events:none;z-index:0}

.container{position:relative;z-index:1;width:100%;max-width:420px}

/* LOGO */
.logo{text-align:center;margin-bottom:40px}
.logo h1{font-family:var(--font-d);font-size:3.5em;letter-spacing:.06em;line-height:1}
.logo h1 span{color:var(--accent)}
.logo p{font-family:var(--font-m);font-size:.72em;color:var(--muted);letter-spacing:.1em;margin-top:6px}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 28px;backdrop-filter:blur(10px)}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--surface2);border-radius:12px;padding:4px;margin-bottom:28px}
.tab-btn{flex:1;padding:10px;border-radius:9px;border:none;background:transparent;color:var(--muted);font-family:var(--font-b);font-size:.82em;font-weight:600;cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--accent);color:#080b10}

/* FORM */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.72em;color:var(--muted);font-family:var(--font-m);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.form-input{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font-b);font-size:.9em;outline:none;transition:border-color .2s}
.form-input:focus{border-color:rgba(245,200,66,0.4)}
.form-input::placeholder{color:var(--muted)}

/* BUTTONS */
.btn{width:100%;padding:14px;border-radius:12px;border:none;font-family:var(--font-b);font-size:.9em;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:10px}
.btn-primary{background:var(--accent);color:#080b10}
.btn-primary:hover{background:#e6bb30;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-google{background:var(--surface2);color:var(--text);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;border-radius:12px;cursor:pointer;transition:all .2s;font-family:var(--font-b);font-size:.88em;font-weight:600;margin-bottom:10px}
.btn-google:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.05)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:16px 0}
.divider span{font-size:.7em;color:var(--muted);font-family:var(--font-m);white-space:nowrap}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ALERT */
.alert{padding:10px 14px;border-radius:8px;font-size:.78em;margin-bottom:14px;display:none}
.alert.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:#f87171}
.alert.success{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);color:#4ade80}
.alert.show{display:block}

/* LOADING SPINNER */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:#080b10;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
.footer-text{text-align:center;font-size:.68em;color:var(--muted);margin-top:20px;font-family:var(--font-m)}

/* LOADING SCREEN */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:16px}
#loading-screen h2{font-family:var(--font-d);font-size:2em;color:var(--accent);letter-spacing:.06em}
#loading-screen p{font-family:var(--font-m);font-size:.72em;color:var(--muted)}
.loading-bar{width:200px;height:3px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-top:8px}
.loading-bar-fill{height:100%;background:var(--accent);border-radius:3px;animation:loading 1.5s ease-in-out infinite}
@keyframes loading{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <h2>FITBODY</h2>
  <p>กำลังตรวจสอบสถานะ...</p>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<div class="glow"></div>

<div class="container" id="main-container" style="display:none">
  <!-- LOGO -->
  <div class="logo">
    <h1>FIT<span>BODY</span></h1>
    <p>PERSONAL FITNESS TRACKER</p>
  </div>

  <!-- LOGIN CARD -->
  <div class="card">
    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login', this)">เข้าสู่ระบบ</button>
      <button class="tab-btn" onclick="switchTab('register', this)">สมัครสมาชิก</button>
    </div>

    <!-- ALERT -->
    <div class="alert" id="alert-box"></div>

    <!-- GOOGLE LOGIN -->
    <button class="btn-google" onclick="loginWithGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      เข้าสู่ระบบด้วย Google
    </button>

    <div class="divider"><span>หรือใช้ Email</span></div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="login-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')loginWithEmail()">
      </div>
      <button class="btn btn-primary" id="login-btn" onclick="loginWithEmail()">
        เข้าสู่ระบบ
      </button>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" style="display:none">
      <div style="margin-bottom:20px">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4em;letter-spacing:.06em;color:var(--accent);margin-bottom:4px">START YOUR TRANSFORMATION</div>
        <div style="font-family:'DM Mono',monospace;font-size:.65em;color:var(--muted);margin-bottom:12px">ฟรี · ไม่มีโฆษณา · ข้อมูลของคุณเป็นของคุณ</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <span style="border:1px solid rgba(245,200,66,.2);background:rgba(245,200,66,.05);border-radius:20px;padding:3px 10px;font-family:'DM Mono',monospace;font-size:.6em;color:var(--accent)">⚡ TDEE + Macro</span>
          <span style="border:1px solid rgba(245,200,66,.2);background:rgba(245,200,66,.05);border-radius:20px;padding:3px 10px;font-family:'DM Mono',monospace;font-size:.6em;color:var(--accent)">🏋️ Workout Plan</span>
          <span style="border:1px solid rgba(245,200,66,.2);background:rgba(245,200,66,.05);border-radius:20px;padding:3px 10px;font-family:'DM Mono',monospace;font-size:.6em;color:var(--accent)">📊 Progress Track</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">ชื่อ-นามสกุล</label>
        <input type="text" class="form-input" id="reg-name" placeholder="เช่น Somchai K.">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="reg-email" placeholder="your@email.com">
      </div>
      <div class="form-group" style="position:relative">
        <label class="form-label">Password (อย่างน้อย 6 ตัวอักษร)</label>
        <input type="password" class="form-input" id="reg-password" placeholder="••••••••" oninput="checkPasswordStrength(this.value)" style="padding-right:42px">
        <button type="button" onclick="togglePwVisibility()" style="position:absolute;right:12px;bottom:11px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:.9em;padding:2px">👁</button>
      </div>
      <div id="pw-strength-wrap" style="margin-top:-10px;margin-bottom:14px;display:none">
        <div style="height:3px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden;margin-bottom:4px">
          <div id="pw-strength-bar" style="height:100%;border-radius:3px;transition:all .3s;width:0"></div>
        </div>
        <div id="pw-strength-label" style="font-family:'DM Mono',monospace;font-size:.62em;color:var(--muted)"></div>
      </div>
      <button class="btn btn-primary" id="register-btn" onclick="registerWithEmail()">
        เริ่มต้นฟรี →
      </button>
      <p style="text-align:center;font-family:'DM Mono',monospace;font-size:.62em;color:var(--muted);margin-top:6px">การสมัครถือว่ายอมรับ Privacy Policy · ไม่มีการขายข้อมูล</p>
    </div>
  </div>

  <p class="footer-text">FitBody · Personal Use Only · v1.0</p>
</div>

<script>
// Init Supabase
const { createClient } = supabase
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// Check if already logged in
async function checkSession() {
  const { data: { session } } = await sb.auth.getSession()
  if (session) {
    window.location.href = 'dashboard.html'
    return
  }
  document.getElementById('loading-screen').style.display = 'none'
  document.getElementById('main-container').style.display = 'block'
}

// Handle Google OAuth redirect
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    window.location.href = 'dashboard.html'
  }
})

// Switch Login/Register tabs
function switchTab(tab, el) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  el.classList.add('active')
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none'
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none'
  hideAlert()
}

// Show Alert
function showAlert(msg, type = 'error') {
  const el = document.getElementById('alert-box')
  el.textContent = msg
  el.className = `alert ${type} show`
}
function hideAlert() {
  document.getElementById('alert-box').className = 'alert'
}

// Google Login
async function loginWithGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: REDIRECT_URL + '/dashboard.html' }
  })
  if (error) showAlert('เกิดข้อผิดพลาด: ' + error.message)
}

// Email Login
async function loginWithEmail() {
  const email = document.getElementById('login-email').value.trim()
  const password = document.getElementById('login-password').value
  if (!email || !password) { showAlert('กรุณากรอก Email และ Password'); return }

  const btn = document.getElementById('login-btn')
  btn.innerHTML = '<span class="spinner"></span>กำลังเข้าสู่ระบบ...'
  btn.disabled = true
  hideAlert()

  const { error } = await sb.auth.signInWithPassword({ email, password })
  if (error) {
    showAlert('Email หรือ Password ไม่ถูกต้อง')
    btn.innerHTML = 'เข้าสู่ระบบ'
    btn.disabled = false
  }
  // ถ้าสำเร็จ onAuthStateChange จะ redirect ให้อัตโนมัติ
}

// Email Register
async function registerWithEmail() {
  const name = document.getElementById('reg-name').value.trim()
  const email = document.getElementById('reg-email').value.trim()
  const password = document.getElementById('reg-password').value
  if (!name || !email || !password) { showAlert('กรุณากรอกข้อมูลให้ครบ'); return }
  if (password.length < 6) { showAlert('Password ต้องมีอย่างน้อย 6 ตัวอักษร'); return }

  const btn = document.getElementById('register-btn')
  btn.innerHTML = '<span class="spinner"></span>กำลังสมัคร...'
  btn.disabled = true

  const { error } = await sb.auth.signUp({
    email, password,
    options: { data: { full_name: name } }
  })

  if (error) {
    showAlert('เกิดข้อผิดพลาด: ' + error.message)
    btn.innerHTML = 'เริ่มต้นฟรี →'
    btn.disabled = false
  } else {
    document.getElementById('register-form').innerHTML = `
      <div style="text-align:center;padding:20px 0">
        <div style="font-size:3em;margin-bottom:16px">✉️</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.8em;letter-spacing:.06em;color:var(--accent3);margin-bottom:8px">CHECK YOUR EMAIL</div>
        <div style="font-size:.8em;color:var(--muted);line-height:1.8;margin-bottom:20px">ส่งลิงก์ยืนยันไปที่<br><span style="color:var(--text);font-family:'DM Mono',monospace">${email}</span><br>กดลิงก์เพื่อเริ่มใช้งาน</div>
        <a href="https://mail.google.com" target="_blank" style="display:inline-block;padding:10px 20px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.82em;text-decoration:none">เปิด Gmail →</a>
      </div>
    `
  }
}

// Password visibility toggle
function togglePwVisibility() {
  const inp = document.getElementById('reg-password')
  inp.type = inp.type === 'password' ? 'text' : 'password'
}

// Password strength indicator
function checkPasswordStrength(val) {
  const wrap = document.getElementById('pw-strength-wrap')
  const bar = document.getElementById('pw-strength-bar')
  const label = document.getElementById('pw-strength-label')
  if (!val) { wrap.style.display = 'none'; return }
  wrap.style.display = 'block'
  let score = 0
  if (val.length >= 6) score++
  if (val.length >= 10) score++
  if (/[0-9]/.test(val) && /[a-zA-Z]/.test(val)) score++
  const levels = [
    { width: '33%', color: '#f87171', text: 'อ่อนมาก' },
    { width: '66%', color: '#f5c842', text: 'ปานกลาง' },
    { width: '100%', color: '#4ade80', text: '✓ ดี' },
  ]
  const lv = levels[Math.min(score, 2)]
  bar.style.width = lv.width
  bar.style.background = lv.color
  label.textContent = lv.text
  label.style.color = lv.color
}

// Start
checkSession()
</script>
</body>
</html>
